name: Publish release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version --ignore-scripts
          node version-bump.mjs
          VERSION="$(node -p "require('./package.json').version")"
          if [ "$(node -p "require('./manifest.json').version")" != "${VERSION}" ]; then
            echo "manifest.json version does not match package.json after version-bump.mjs"
            exit 1
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build release artifacts
        run: npm run build

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json manifest.json versions.json
          git commit -m "release ${{ steps.version.outputs.version }} [skip ci]"

      - name: Push release commit and tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git tag "${VERSION}"
          git push origin main
          git push origin "${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes "Automated release ${VERSION} from commit ${GITHUB_SHA}." \
            main.js manifest.json styles.css versions.json
