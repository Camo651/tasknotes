name: Publish release (Merge main -> release)

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [release]

permissions:
  contents: write

jobs:
  build:
    if: >-
      ${{
        github.event_name == 'push' ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          github.event.pull_request.head.ref == 'main' &&
          github.event.pull_request.base.ref == 'release'
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.merge_commit_sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build release artifacts
        run: npm run build

      - name: Resolve version and tag
        if: github.event_name == 'pull_request'
        id: version
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Ensure tag does not already exist
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release tag ${{ steps.version.outputs.tag }} already exists."
            exit 1
          fi

      - name: Create GitHub release
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Automated release from merged PR #${{ github.event.pull_request.number }} (main -> release)." \
            main.js manifest.json styles.css versions.json
